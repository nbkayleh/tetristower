<!DOCTYPE html>
<div id="root" style="width:100%;background:#07071a;display:flex;flex-direction:column;align-items:center;font-family:'Courier New',monospace;overflow:hidden;position:relative;">
<style>
*{box-sizing:border-box;}
#gameCanvas{display:block;}
.ui-col{display:flex;flex-direction:column;gap:10px;padding:14px 8px;min-width:110px;}
.score-box{background:rgba(255,255,255,0.05);border:1px solid rgba(0,255,200,0.3);border-radius:6px;padding:8px 12px;text-align:center;}
.score-label{font-size:10px;color:#0fd;letter-spacing:2px;text-transform:uppercase;}
.score-val{font-size:20px;font-weight:bold;color:#fff;}
.side-btn{background:rgba(0,255,200,0.1);border:1px solid #0fd;color:#0fd;padding:7px 14px;border-radius:4px;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;letter-spacing:1px;width:100%;}
.side-btn:hover{background:rgba(0,255,200,0.25);}
.keys-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;}
.keys-title{color:#0fd;font-size:11px;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.key-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.key{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:3px;padding:2px 7px;font-size:12px;color:#fff;min-width:22px;text-align:center;}
.key-desc{font-size:12px;color:rgba(255,255,255,0.55);}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,0.92);z-index:100;}
.t-wrap{position:relative;margin-bottom:10px;}
.t-shadow{position:absolute;top:4px;left:4px;font-size:48px;font-weight:900;letter-spacing:6px;color:#003322;white-space:nowrap;}
.t-outline{position:absolute;top:0;left:0;font-size:48px;font-weight:900;letter-spacing:6px;white-space:nowrap;-webkit-text-stroke:2px rgba(0,255,200,0.5);color:transparent;}
.t-main{position:relative;font-size:48px;font-weight:900;letter-spacing:6px;white-space:nowrap;background:linear-gradient(180deg,#fff 0%,#00ffcc 50%,#00aa88 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.t-sub{font-size:13px;letter-spacing:6px;color:rgba(0,255,200,0.7);text-transform:uppercase;margin-bottom:6px;margin-top:-4px;}
.t-divider{width:220px;height:1px;background:linear-gradient(90deg,transparent,#0fd,transparent);margin:10px auto 20px;}
.t-tagline{color:rgba(255,255,255,0.45);font-size:12px;margin:0 0 22px;letter-spacing:2px;}
#startBtn{background:rgba(0,255,200,0.15);border:2px solid #0fd;color:#0fd;padding:12px 32px;border-radius:6px;cursor:pointer;font-family:'Courier New',monospace;font-size:15px;letter-spacing:3px;font-weight:bold;position:relative;z-index:200;display:block;}
#startBtn:hover{background:rgba(0,255,200,0.35);color:#fff;}
#startBtn:active{transform:scale(0.97);}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.88}}
.t-main{animation:flicker 3s ease-in-out infinite;}
</style>

<div id="overlay">
  <div class="t-wrap">
    <div class="t-shadow">TETRIS TOWER</div>
    <div class="t-outline">TETRIS TOWER</div>
    <div class="t-main">TETRIS TOWER</div>
  </div>
  <div class="t-sub">City Builder</div>
  <div class="t-divider"></div>
  <p class="t-tagline">Stack the skyline. Rule the night.</p>
  <button id="startBtn">▶ START</button>
</div>

<div style="display:flex;flex-direction:row;align-items:flex-start;justify-content:center;">
  <div class="ui-col">
    <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="scoreVal">0</div></div>
    <div class="score-box"><div class="score-label">Level</div><div class="score-val" id="levelVal">1</div></div>
    <div class="score-box"><div class="score-label">Lines</div><div class="score-val" id="linesVal">0</div></div>
    <div class="score-box" style="padding-bottom:6px;"><div class="score-label">Next</div><canvas id="nextCanvas" width="90" height="90"></canvas></div>
    <button class="side-btn" id="muteBtn">🔊 Music</button>
  </div>
  <canvas id="gameCanvas" width="360" height="640"></canvas>
  <div class="ui-col" style="min-width:130px;">
    <div class="keys-panel">
      <div class="keys-title">Controls</div>
      <div class="key-row"><span class="key">←</span><span class="key-desc">Move left</span></div>
      <div class="key-row"><span class="key">→</span><span class="key-desc">Move right</span></div>
      <div class="key-row"><span class="key">↑</span><span class="key-desc">Rotate</span></div>
      <div class="key-row"><span class="key">↓</span><span class="key-desc">Soft drop</span></div>
      <div class="key-row"><span class="key">Spc</span><span class="key-desc">Hard drop</span></div>
    </div>
  </div>
</div>

<script>
const C   = document.getElementById('gameCanvas');
const ctx = C.getContext('2d');
const NC  = document.getElementById('nextCanvas');
const nctx= NC.getContext('2d');

const COLS=10, ROWS=26, CW=28, CH=14, ISO=7;
const BX=20, BY=90;
const STREET_Y   = BY + ROWS*CH;  // 454
const SIDEWALK_H = 14;            // shorter — canvas is only 640 so street is cropped
const CANVAS_H   = 640;

let isDay=false, transT=0, dayTransDir=0;

// ── audio ──────────────────────────────────────────────────
let audioCtx=null, muted=false, stepTimer=null, beat=0;
function ensureAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function fr(note,oct){
  const n={C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
  return 440*Math.pow(2,(n[note]+(oct-4)*12-9)/12);
}
const BPM=152, SL=60/BPM*0.60, SS=60/BPM*0.40;
function tone(freq,start,dur,vol,type,det){
  if(!audioCtx||muted||!freq) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type||'square'; o.frequency.value=freq; if(det) o.detune.value=det;
  const now=audioCtx.currentTime;
  g.gain.setValueAtTime(0,now+start); g.gain.linearRampToValueAtTime(vol,now+start+0.008);
  g.gain.setValueAtTime(vol*0.7,now+start+dur*0.5); g.gain.linearRampToValueAtTime(0,now+start+dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(now+start); o.stop(now+start+dur+0.02);
}
const ROOTS=[fr('D',2),fr('G',2),fr('C',2),fr('C',2),fr('A',2),fr('D',2),fr('G',2),fr('G',2),fr('E',2),fr('A',2),fr('F',2),fr('G',2),fr('C',2),fr('Eb',2),fr('D',2),fr('G',2)];
const WALK=[[fr('D',2),fr('F',2),fr('A',2),fr('C',3)],[fr('G',2),fr('B',2),fr('D',3),fr('F',3)],[fr('C',2),fr('E',2),fr('G',2),fr('B',2)],[fr('C',2),fr('D',2),fr('E',2),fr('A',2)],[fr('A',2),fr('C',3),fr('E',3),fr('G',3)],[fr('D',2),fr('F#',2),fr('A',2),fr('C',3)],[fr('G',2),fr('B',2),fr('D',3),fr('F#',3)],[fr('G',2),fr('A',2),fr('B',2),fr('D',3)],[fr('E',2),fr('G',2),fr('B',2),fr('D',3)],[fr('A',2),fr('C#',3),fr('E',3),fr('G',3)],[fr('F',2),fr('A',2),fr('C',3),fr('E',3)],[fr('G',2),fr('B',2),fr('D',3),fr('F',3)],[fr('C',2),fr('E',2),fr('G',2),fr('B',2)],[fr('Eb',2),fr('G',2),fr('Bb',2),fr('Db',3)],[fr('D',2),fr('F',2),fr('A',2),fr('C',3)],[fr('G',2),fr('F',2),fr('E',2),fr('D',2)]];
const PA=[fr('E',5),null,fr('G',5),fr('A',5),fr('G',5),fr('E',5),null,fr('D',5),fr('F',5),null,fr('A',5),fr('G',5),fr('E',5),fr('D',5),fr('C',5),null];
const PB=[fr('G',5),fr('F#',5),fr('F',5),fr('E',5),null,fr('G',5),fr('A',5),null,fr('Bb',5),fr('A',5),fr('G',5),null,fr('F',5),fr('E',5),fr('D',5),fr('E',5)];
const PC=[fr('C',6),null,fr('G',5),null,fr('E',5),fr('F',5),fr('G',5),fr('A',5),fr('G',5),null,fr('E',5),fr('D',5),null,fr('E',5),null,fr('G',5)];
const PD=[fr('A',5),fr('G',5),fr('F',5),fr('E',5),fr('D',5),null,fr('F',5),fr('A',5),fr('G',5),fr('E',5),fr('C',5),null,fr('D',5),fr('E',5),fr('G',5),null];
const PHRASES=[PA,PB,PC,PD];
function getMel(b){ return PHRASES[Math.floor(b/16)%4][b%16]; }
function scheduleNextBeat(){
  if(!audioCtx||muted) return;
  const b=beat, sw=(b%2===0)?SL:SS, ci=Math.floor(b/4)%WALK.length;
  tone(WALK[ci][b%4],0,sw*0.82,0.18,'triangle');
  if(b%4===0){ const r=ROOTS[ci]; tone(r*2,0,sw*3.8,0.028,'sine'); tone(r*2.5,0,sw*3.8,0.022,'sine',5); tone(r*3,0,sw*3.8,0.016,'sine',-5); }
  const mf=getMel(b%64); if(mf) tone(mf,0,sw*0.75,0.09,'square');
  tone(1320+(b%5)*90,0,sw*0.15,(b%4===0||b%4===2)?0.03:0.016,'triangle');
  if(b%4===1||b%4===3) tone(180,0,sw*0.1,0.035,'square',900);
  if(b%8===0){ tone(ROOTS[ci]*4,0,sw*0.22,0.04,'sawtooth'); tone(ROOTS[ci]*5,0,sw*0.22,0.03,'sawtooth'); }
  beat++; stepTimer=setTimeout(scheduleNextBeat,sw*1000);
}
function startMusic(){ if(muted) return; try{ ensureAudio(); beat=0; scheduleNextBeat(); }catch(e){} }
function stopMusic(){ if(stepTimer){ clearTimeout(stepTimer); stepTimer=null; } }
function playLineClear(count){
  try{ ensureAudio(); [fr('C',5),fr('E',5),fr('G',5),fr('B',5),fr('C',6)].slice(0,count+2).forEach((f,i)=>tone(f,i*0.055,0.13,0.14,'square')); tone(fr('C',6),0.32,0.22,0.10,'sine'); }catch(e){}
}
document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted; document.getElementById('muteBtn').textContent=muted?'🔇 Music':'🔊 Music';
  if(muted) stopMusic(); else startMusic();
});

// ── game ──────────────────────────────────────────────────
const PIECES=[{shape:[[1,1,1,1]],color:'#00ffcc'},{shape:[[1,1],[1,1]],color:'#ffcc00'},{shape:[[0,1,0],[1,1,1]],color:'#ff6600'},{shape:[[1,0,0],[1,1,1]],color:'#0088ff'},{shape:[[0,0,1],[1,1,1]],color:'#ff3366'},{shape:[[0,1,1],[1,1,0]],color:'#00ff88'},{shape:[[1,1,0],[0,1,1]],color:'#cc44ff'}];
let board,score,level,lines,piece,nextPiece,gameOver,dropInterval,running,windowGrid=[];

function initWindowGrid(){ windowGrid=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>Math.random()>0.25)); }
function initGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  initWindowGrid(); score=0; level=1; lines=0; gameOver=false;
  isDay=false; transT=0; dayTransDir=0; updateUI();
  nextPiece=randomPiece(); spawnPiece();
  if(dropInterval) clearInterval(dropInterval);
  dropInterval=setInterval(tick,600); running=true;
}
function randomPiece(){ const p=PIECES[Math.floor(Math.random()*PIECES.length)]; return{shape:p.shape.map(r=>[...r]),color:p.color,x:Math.floor(COLS/2)-1,y:0}; }
function spawnPiece(){
  piece={...nextPiece,x:Math.floor(COLS/2)-Math.floor(nextPiece.shape[0].length/2),y:0};
  nextPiece=randomPiece(); drawNext();
  if(!isValid(piece.shape,piece.x,piece.y)){ gameOver=true; endGame(); }
}
function isValid(shape,px,py){
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++) if(shape[r][c]){
    const nx=px+c,ny=py+r; if(nx<0||nx>=COLS||ny>=ROWS) return false;
    if(ny>=0&&board[ny][nx]) return false;
  } return true;
}
function rotate(shape){
  const rows=shape.length,cols=shape[0].length,r=Array.from({length:cols},()=>Array(rows).fill(0));
  for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) r[j][rows-1-i]=shape[i][j];
  return r;
}
function lock(){
  for(let r=0;r<piece.shape.length;r++) for(let c=0;c<piece.shape[r].length;c++)
    if(piece.shape[r][c]) board[piece.y+r][piece.x+c]=piece.color;
  clearLines(); spawnPiece();
}
function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){ if(board[r].every(c=>c)){ board.splice(r,1); board.unshift(Array(COLS).fill(null)); windowGrid.splice(r,1); windowGrid.unshift(Array.from({length:COLS},()=>Math.random()>0.25)); cleared++; r++; } }
  if(cleared){
    playLineClear(cleared);
    const prev=Math.floor(lines/10);
    score+=[0,100,300,500,800][cleared]*level; lines+=cleared; level=Math.floor(lines/10)+1;
    if(Math.floor(lines/10)>prev){ isDay=!isDay; dayTransDir=isDay?1:-1; }
    clearInterval(dropInterval); dropInterval=setInterval(tick,Math.max(80,600-level*55)); updateUI();
  }
}
function tick(){ if(!gameOver){ if(isValid(piece.shape,piece.x,piece.y+1)) piece.y++; else lock(); } }
function ghostY(){ let gy=piece.y; while(isValid(piece.shape,piece.x,gy+1)) gy++; return gy; }
function updateUI(){ document.getElementById('scoreVal').textContent=score; document.getElementById('levelVal').textContent=level; document.getElementById('linesVal').textContent=lines; }
function showOverlay(html){ const ov=document.getElementById('overlay'); ov.innerHTML=html; ov.style.display='flex'; const btn=ov.querySelector('#startBtn'); if(btn) btn.addEventListener('click',handleStart); }
function endGame(){
  clearInterval(dropInterval); running=false; stopMusic();
  showOverlay(`<div class="t-wrap"><div class="t-shadow" style="font-size:40px;">GAME OVER</div><div class="t-outline" style="font-size:40px;">GAME OVER</div><div class="t-main" style="font-size:40px;">GAME OVER</div></div><div class="t-divider"></div><p class="t-tagline">Final Score: ${score}</p><button id="startBtn">▶ PLAY AGAIN</button>`);
}
function handleStart(){ document.getElementById('overlay').style.display='none'; initWalkers(); initGame(); startMusic(); }

function shadeColor(hex,amt){
  let r=0,g=0,b=0;
  if(hex&&hex[0]==='#'){r=parseInt(hex.slice(1,3),16)||0;g=parseInt(hex.slice(3,5),16)||0;b=parseInt(hex.slice(5,7),16)||0;}
  else if(hex){const m=hex.match(/\d+/g);if(m){r=+m[0];g=+m[1];b=+m[2];}}
  return`rgb(${Math.min(255,Math.max(0,r+amt))},${Math.min(255,Math.max(0,g+amt))},${Math.min(255,Math.max(0,b+amt))})`;
}
function lerpColor(c1,c2,t){
  function parse(c){if(!c)return[0,0,0];if(c[0]==='#')return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];const m=c.match(/\d+/g);return m?[+m[0],+m[1],+m[2]]:[0,0,0];}
  const a=parse(c1),b2=parse(c2);
  return`rgb(${Math.round(a[0]+(b2[0]-a[0])*t)},${Math.round(a[1]+(b2[1]-a[1])*t)},${Math.round(a[2]+(b2[2]-a[2])*t)})`;
}
function pieceOccupies(p,col,row){
  if(!p||!p.shape) return false;
  for(let r=0;r<p.shape.length;r++) for(let c=0;c<p.shape[r].length;c++) if(p.shape[r][c]&&p.x+c===col&&p.y+r===row) return true;
  return false;
}
function updateTransition(){ if(dayTransDir!==0){ transT=Math.min(1,Math.max(0,transT+dayTransDir*0.012)); if(transT>=1||transT<=0) dayTransDir=0; } }

function drawCell(cx,cy,color,r,c,ghostRef){
  ctx.fillStyle=color; ctx.fillRect(cx,cy,CW,CH);
  ctx.fillStyle=shadeColor(color,-50);
  ctx.beginPath(); ctx.moveTo(cx+CW,cy); ctx.lineTo(cx+CW+ISO,cy-ISO/2); ctx.lineTo(cx+CW+ISO,cy+CH-ISO/2); ctx.lineTo(cx+CW,cy+CH); ctx.closePath(); ctx.fill();
  const above=(r>0&&board[r-1]&&board[r-1][c])||pieceOccupies(piece,c,r-1)||(ghostRef&&pieceOccupies(ghostRef,c,r-1));
  if(!above){ ctx.fillStyle=shadeColor(color,40); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+ISO,cy-ISO/2); ctx.lineTo(cx+CW+ISO,cy-ISO/2); ctx.lineTo(cx+CW,cy); ctx.closePath(); ctx.fill(); }
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5; ctx.strokeRect(cx,cy,CW,CH);
  const lit=windowGrid[r]&&windowGrid[r][c];
  ctx.fillStyle=lerpColor(lit?'rgba(255,235,100,0.85)':'rgba(15,25,55,0.5)',lit?'rgba(180,220,255,0.7)':'rgba(140,170,210,0.4)',transT);
  ctx.fillRect(cx+3,cy+3,8,6); ctx.fillRect(cx+16,cy+3,8,6);
}

const stars=Array.from({length:100},()=>({x:Math.random()*360,y:Math.random()*80,r:Math.random()*1.3+0.3,phase:Math.random()*Math.PI*2,speed:Math.random()*0.003+0.001}));
function drawSky(){
  updateTransition(); const t=transT;
  const sky=ctx.createLinearGradient(0,0,0,BY+20); sky.addColorStop(0,lerpColor('#020215','#1a6bbf',t)); sky.addColorStop(1,lerpColor('#08082a','#87ceeb',t));
  ctx.fillStyle=sky; ctx.fillRect(0,0,360,BY+20);
  if(1-t>0.02) stars.forEach(s=>{ s.phase+=s.speed; const a=(0.35+Math.sin(s.phase)*0.3)*(1-t); ctx.fillStyle=`rgba(255,255,255,${Math.max(0,a)})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
  if(t>0.05){ ctx.globalAlpha=t; ctx.fillStyle='#fff9c4'; ctx.beginPath(); ctx.arc(38,18,15,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(255,235,80,0.5)'; ctx.lineWidth=2; for(let i=0;i<8;i++){const a=i*Math.PI/4; ctx.beginPath(); ctx.moveTo(38+Math.cos(a)*17,18+Math.sin(a)*17); ctx.lineTo(38+Math.cos(a)*25,18+Math.sin(a)*25); ctx.stroke();} ctx.globalAlpha=1; }
  if(t<0.9){ ctx.globalAlpha=1-t; ctx.fillStyle='rgba(255,250,200,0.92)'; ctx.beginPath(); ctx.arc(318,24,13,0,Math.PI*2); ctx.fill(); ctx.fillStyle=lerpColor('#06071a','#1a6bbf',t); ctx.beginPath(); ctx.arc(324,22,10,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
  ctx.fillStyle=lerpColor('rgba(15,15,40,0.9)','rgba(60,80,110,0.5)',t);
  [[0,55,18],[18,BY-8,14],[32,BY-2,28],[60,BY-14,10],[70,BY-2,35],[270,BY-10,22],[292,BY-4,32],[324,BY-16,14],[338,BY-3,12]].forEach(([x,y,w])=>ctx.fillRect(x,y,w,BY-y+2));
}

const WALKER_COLORS=['#ff9966','#66ccff','#ffcc44','#cc88ff','#88ffcc','#ff6688','#ffffaa'];
const walkers=[];
function initWalkers(){ walkers.length=0; for(let i=0;i<5;i++) walkers.push({x:30+i*60+Math.random()*20,speed:(Math.random()*0.22+0.10)*(Math.random()<0.5?1:-1),frame:0,frameTimer:0,color:WALKER_COLORS[i%WALKER_COLORS.length],size:1.0+Math.random()*0.15,phase:Math.random()*Math.PI*2}); }

function drawStreetScene(){
  const t=transT, sy=STREET_Y;
  // Sidewalk — only draw what fits in canvas height
  ctx.fillStyle=lerpColor('#1c2030','#c8c8b8',t); ctx.fillRect(0,sy,360,SIDEWALK_H);
  ctx.strokeStyle=lerpColor('rgba(255,255,255,0.04)','rgba(0,0,0,0.1)',t); ctx.lineWidth=1;
  for(let x=45;x<360;x+=45){ ctx.beginPath(); ctx.moveTo(x,sy); ctx.lineTo(x,sy+SIDEWALK_H); ctx.stroke(); }
  // Curb edge
  ctx.fillStyle=lerpColor('#252b3a','#aaaaaa',t); ctx.fillRect(0,sy+SIDEWALK_H,360,3);
  // Road — only visible stripe, cropped by canvas
  ctx.fillStyle=lerpColor('#111520','#555555',t); ctx.fillRect(0,sy+SIDEWALK_H+3,360,CANVAS_H-(sy+SIDEWALK_H+3));

  // Street lamps anchored to sidewalk
  const lg=1-t*0.85;
  [55,185,310].forEach(lx=>{
    const pt=sy-6; ctx.strokeStyle=lerpColor('#3a4055','#888888',t); ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(lx,sy+SIDEWALK_H); ctx.lineTo(lx,pt); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx,pt); ctx.lineTo(lx+12,pt-4); ctx.stroke();
    ctx.globalAlpha=lg; ctx.fillStyle='rgba(255,240,140,0.6)'; ctx.beginPath(); ctx.arc(lx+12,pt-4,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,240,140,0.1)'; ctx.beginPath(); ctx.arc(lx+12,pt-4,18,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });

  // Walkers on sidewalk, clipped so they don't overflow canvas
  walkers.forEach(w=>{
    w.frameTimer++; if(w.frameTimer>15){w.frame=(w.frame+1)%4;w.frameTimer=0;w.phase+=0.05;}
    w.x+=w.speed; if(w.x>380)w.x=-12; if(w.x<-12)w.x=382;
    const s=w.size, bx=w.x, fy=sy+SIDEWALK_H-2;
    const bob=Math.sin(w.phase+w.frame*1.57)*1.2, flip=w.speed<0, swing=Math.sin(w.phase+w.frame*1.57)*3.5*s;
    ctx.save();
    // clip to canvas bottom so walkers don't overflow
    ctx.beginPath(); ctx.rect(0,0,360,CANVAS_H); ctx.clip();
    if(flip){ctx.scale(-1,1);ctx.translate(-bx*2,0);}
    const by=fy+bob;
    ctx.fillStyle='#222'; ctx.fillRect(bx-5*s,by-4*s,4*s,4*s); ctx.fillRect(bx+1*s,by-4*s,4*s,4*s);
    ctx.strokeStyle=shadeColor(w.color,-30); ctx.lineWidth=2.5*s;
    ctx.beginPath(); ctx.moveTo(bx-2*s,by-8*s); ctx.lineTo(bx-2*s+swing,by-2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+2*s,by-8*s); ctx.lineTo(bx+2*s-swing,by-2*s); ctx.stroke();
    ctx.fillStyle=w.color; ctx.fillRect(bx-5*s,by-20*s,10*s,12*s);
    ctx.strokeStyle=w.color; ctx.lineWidth=2*s;
    ctx.beginPath(); ctx.moveTo(bx-5*s,by-18*s); ctx.lineTo(bx-9*s,by-13*s-swing*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+5*s,by-18*s); ctx.lineTo(bx+9*s,by-13*s+swing*0.4); ctx.stroke();
    ctx.fillStyle='#f5c5a0'; ctx.beginPath(); ctx.arc(bx,by-25*s,4.5*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=shadeColor(w.color,-20); ctx.beginPath(); ctx.arc(bx,by-27*s,4*s,Math.PI,0); ctx.fill();
    ctx.restore();
  });
}

// ── worker — shorter arms ─────────────────────────────────
let workerBobT=0, workerArmT=0;
function drawWorker(roofY){
  workerBobT+=0.022; workerArmT+=0.028;
  const bob=Math.sin(workerBobT)*1.2;
  const cx=BX+(COLS*CW)/2, feet=roofY+bob;

  // proportions
  const footH=5, footW=7, legH=14, legW=5, torsoH=13, torsoW=14, headR=6;
  const hatBrimW=18, hatBrimH=3, hatDomeW=14, hatDomeH=9;
  const torsoBotY=feet-footH-legH, torsoTopY=torsoBotY-torsoH;
  const headCY=torsoTopY-headR, legBotY=feet-footH;
  const hatBrimY=headCY-headR-hatBrimH+1;

  // boots
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.roundRect(cx-legW-2,legBotY,footW,footH,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(cx+2,legBotY,footW,footH,2); ctx.fill();
  ctx.fillStyle='#333'; ctx.fillRect(cx-legW-1,legBotY,footW-2,2); ctx.fillRect(cx+3,legBotY,footW-2,2);

  // jeans
  ctx.fillStyle='#2255aa'; ctx.fillRect(cx-legW-1,torsoTopY+torsoH,legW,legH); ctx.fillRect(cx+2,torsoTopY+torsoH,legW,legH);
  ctx.strokeStyle='#1a4488'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-legW/2-1,torsoBotY); ctx.lineTo(cx-legW/2-1,legBotY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+legW/2+2,torsoBotY); ctx.lineTo(cx+legW/2+2,legBotY); ctx.stroke();

  // hi-vis vest
  ctx.fillStyle='#ff6600'; ctx.beginPath(); ctx.roundRect(cx-torsoW/2,torsoTopY,torsoW,torsoH,2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,180,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-torsoW/2+2,torsoTopY+5); ctx.lineTo(cx+torsoW/2-2,torsoTopY+5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-torsoW/2+2,torsoTopY+9); ctx.lineTo(cx+torsoW/2-2,torsoTopY+9); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(cx-5,torsoTopY+3,4,3);

  // LEFT ARM — shorter: upper arm 7px, forearm 5px
  const lSwing=Math.sin(workerArmT)*0.5;
  const lAx=cx-torsoW/2, lAy=torsoTopY+4;
  const lElbowX=lAx-7+Math.sin(lSwing)*3, lElbowY=lAy+7+Math.cos(lSwing)*2;
  const lHandX=lElbowX-3, lHandY=lElbowY+5;
  ctx.strokeStyle='#ff6600'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(lAx,lAy); ctx.lineTo(lElbowX,lElbowY); ctx.stroke();
  ctx.strokeStyle='#f5c5a0'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(lElbowX,lElbowY); ctx.lineTo(lHandX,lHandY); ctx.stroke();
  ctx.lineCap='butt';

  // RIGHT ARM — shorter: upper arm 7px, forearm 5px, raised to hold rope
  const rSwing=Math.sin(workerArmT+1.2)*0.3;
  const rAx=cx+torsoW/2, rAy=torsoTopY+4;
  const rElbowX=rAx+7+Math.sin(rSwing)*2, rElbowY=rAy-4+Math.cos(rSwing)*1.5;
  const rHandX=rElbowX+5, rHandY=rElbowY-6;
  ctx.strokeStyle='#ff6600'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(rAx,rAy); ctx.lineTo(rElbowX,rElbowY); ctx.stroke();
  ctx.strokeStyle='#f5c5a0'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(rElbowX,rElbowY); ctx.lineTo(rHandX,rHandY); ctx.stroke();
  ctx.lineCap='butt';

  // head
  ctx.fillStyle='#f5c5a0'; ctx.beginPath(); ctx.arc(cx,headCY,headR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c8956a';
  ctx.beginPath(); ctx.arc(cx-2,headCY-1,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+2,headCY-1,1.2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#c8956a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,headCY+1,2.5,0.2,Math.PI-0.2); ctx.stroke();

  // hard hat
  ctx.fillStyle='#f5c200';
  ctx.beginPath(); ctx.roundRect(cx-hatBrimW/2,hatBrimY,hatBrimW,hatBrimH,1); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx,hatBrimY,hatDomeW/2,hatDomeH,0,Math.PI,0,true); ctx.fill();
  ctx.fillStyle='rgba(255,255,200,0.35)';
  ctx.beginPath(); ctx.ellipse(cx-2,hatBrimY-3,hatDomeW/4,hatDomeH/2.5,-0.3,Math.PI,0,true); ctx.fill();
  ctx.fillStyle='#c9a000'; ctx.fillRect(cx-hatBrimW/2,hatBrimY+hatBrimH-1,hatBrimW,2);
  ctx.strokeStyle='#c9a000'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-hatDomeW/2,hatBrimY); ctx.lineTo(cx+hatDomeW/2,hatBrimY); ctx.stroke();

  // rope from right hand to falling piece
  if(piece&&!gameOver){
    const px=BX+(piece.x+Math.floor(piece.shape[0].length/2))*CW+CW/2;
    const py=BY+piece.y*CH;
    ctx.strokeStyle='rgba(210,190,130,0.55)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(rHandX,rHandY);
    ctx.bezierCurveTo(rHandX+8,rHandY+18,px+8,py-18,px,py);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

function drawNext(){
  nctx.fillStyle='#07071a'; nctx.fillRect(0,0,90,90);
  if(!nextPiece) return;
  const s=nextPiece.shape,rows=s.length,cols=s[0].length,bw=cols*16,bh=rows*9;
  const ox=Math.round((90-bw)/2),oy=Math.round((90-bh)/2);
  for(let r=s.length-1;r>=0;r--) for(let c=0;c<cols;c++) if(s[r][c]){
    const cx2=ox+c*16,cy2=oy+r*9;
    nctx.fillStyle=nextPiece.color; nctx.fillRect(cx2,cy2,15,8);
    nctx.fillStyle=shadeColor(nextPiece.color,-45); nctx.beginPath(); nctx.moveTo(cx2+15,cy2); nctx.lineTo(cx2+19,cy2-3); nctx.lineTo(cx2+19,cy2+5); nctx.lineTo(cx2+15,cy2+8); nctx.closePath(); nctx.fill();
    nctx.fillStyle=shadeColor(nextPiece.color,35); nctx.beginPath(); nctx.moveTo(cx2,cy2); nctx.lineTo(cx2+4,cy2-3); nctx.lineTo(cx2+19,cy2-3); nctx.lineTo(cx2+15,cy2); nctx.closePath(); nctx.fill();
  }
}

let ghostRef=null;
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,C.width,C.height);
  drawSky();
  const t=transT;
  ctx.fillStyle=lerpColor('#0d1220','#d0d8e8',t); ctx.fillRect(BX,BY,COLS*CW,ROWS*CH);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(!board[r][c]){
    const cx2=BX+c*CW,cy2=BY+r*CH;
    ctx.fillStyle=lerpColor('#0d1220','#c8d0e0',t); ctx.fillRect(cx2,cy2,CW,CH);
    ctx.fillStyle=lerpColor('rgba(15,25,55,0.6)','rgba(140,165,200,0.35)',t); ctx.fillRect(cx2+3,cy2+3,8,6); ctx.fillRect(cx2+16,cy2+3,8,6);
    ctx.strokeStyle=lerpColor('rgba(255,255,255,0.03)','rgba(0,0,0,0.07)',t); ctx.lineWidth=0.5; ctx.strokeRect(cx2,cy2,CW,CH);
  }
  ghostRef=piece?{shape:piece.shape,x:piece.x,y:ghostY()}:null;
  if(piece&&ghostRef){ const gy=ghostRef.y; for(let r=piece.shape.length-1;r>=0;r--) for(let c=0;c<piece.shape[r].length;c++) if(piece.shape[r][c]){ const cx2=BX+(piece.x+c)*CW,cy2=BY+(gy+r)*CH; ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(cx2+1,cy2+1,CW-2,CH-2); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.strokeRect(cx2+1,cy2+1,CW-2,CH-2); } }
  for(let r=ROWS-1;r>=0;r--) for(let c=0;c<COLS;c++) if(board[r][c]) drawCell(BX+c*CW,BY+r*CH,board[r][c],r,c,ghostRef);
  if(piece&&!gameOver) for(let r=piece.shape.length-1;r>=0;r--) for(let c=0;c<piece.shape[r].length;c++) if(piece.shape[r][c]) drawCell(BX+(piece.x+c)*CW,BY+(piece.y+r)*CH,piece.color,piece.y+r,piece.x+c,ghostRef);
  ctx.strokeStyle='rgba(0,255,200,0.1)'; ctx.lineWidth=1; ctx.strokeRect(BX,BY,COLS*CW,ROWS*CH);
  ctx.fillStyle=lerpColor('#1a2235','#8899aa',t); ctx.fillRect(BX-2,BY-4,COLS*CW+4,5);
  const antX=BX+COLS*CW-18;
  ctx.strokeStyle='#8899aa'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(antX,BY-4); ctx.lineTo(antX,BY-36); ctx.stroke();
  ctx.globalAlpha=1-t*0.7; ctx.fillStyle=(Date.now()%1200)<600?'rgba(255,30,30,1)':'rgba(255,30,30,0.2)'; ctx.beginPath(); ctx.arc(antX,BY-36,3.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  drawWorker(BY);
  drawStreetScene();
}

document.addEventListener('keydown',e=>{
  if(!running||gameOver) return;
  if(e.key==='ArrowLeft'){ if(isValid(piece.shape,piece.x-1,piece.y)) piece.x--; }
  else if(e.key==='ArrowRight'){ if(isValid(piece.shape,piece.x+1,piece.y)) piece.x++; }
  else if(e.key==='ArrowDown'){ if(isValid(piece.shape,piece.x,piece.y+1)) piece.y++; else lock(); }
  else if(e.key==='ArrowUp'){ const rot=rotate(piece.shape); if(isValid(rot,piece.x,piece.y)) piece.shape=rot; else if(isValid(rot,piece.x-1,piece.y)){piece.shape=rot;piece.x--;} else if(isValid(rot,piece.x+1,piece.y)){piece.shape=rot;piece.x++;} }
  else if(e.key===' '){ e.preventDefault(); piece.y=ghostY(); lock(); }
  if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
});

initWalkers();
document.getElementById('startBtn').addEventListener('click',handleStart);
ctx.fillStyle='#07071a'; ctx.fillRect(0,0,C.width,C.height);
requestAnimationFrame(draw);
</script>
